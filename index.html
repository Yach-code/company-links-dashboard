<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業入口網站儀表板 | Company Portal</title>
    <meta name="description" content="Company links dashboard with data visualization.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="dashboard-container">
        <header class="header">
            <div>
                <h1>Portal <span>Hub</span></h1>
                <p>Welcome back. Here are your quick links and metrics.</p>
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Search links...">
                </div>
            </div>
        </header>

        <div class="grid-content">
            <!-- Data Visualization Section -->

                <h2>System Health & Usage</h2>

                        <div class="progress-bar-bg"><div class="progress-bar" style="width: 75%;"></div></div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Server Uptime</span>

                    </div>
                    <div class="stat-card">
                        <span class="stat-label">API Requests</span>
                        <div class="stat-value">45.2k <span class="trend positive">↑ 5%</span></div>

                    </div>
                </div>

            <!-- Links Section -->
            <section class="links-section">
                <div class="env-group">
                    <div class="env-header">
                        <h2>公司正式 <span>Formal</span></h2>
                        <span class="env-badge prod">Production</span>
                    </div>
                    <div class="links-grid" id="formalGrid">
                        <!-- Formal links will be dynamically populated here -->
                    </div>
                </div>

                <div class="env-group" style="margin-top: 60px;">
                    <div class="env-header">
                        <h2>UAT測試 <span>Testing</span></h2>
                        <span class="env-badge uat">Staging</span>
                    </div>
                    <div class="links-grid" id="uatGrid">
                        <!-- UAT links will be dynamically populated here -->
                    </div>
                </div>

                <div class="env-group" style="margin-top: 60px;">
                    <div class="env-header">
                        <h2>議題管理 <span>Issue</span></h2>
                        <span class="env-badge issue">Issue</span>
                    </div>
                    <div class="links-grid" id="issueGrid">
                        <!-- Formal links will be dynamically populated here -->
                    </div>
                </div>

                  <div class="env-group" style="margin-top: 60px;">
                    <div class="env-header">
                        <h2>舊版系統 <span>Old</span></h2>
                        <span class="env-badge old">Old</span>
                    </div>
                    <div class="links-grid" id="oldGrid">
                        <!-- Formal links will be dynamically populated here -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
